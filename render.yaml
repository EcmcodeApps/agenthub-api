services:
  - type: web
    name: agenthub-api
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MOCK_AI_MODE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
